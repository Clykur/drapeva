# Golden Silk Emporium — CI/CD (Next.js / TypeScript / Supabase / Prisma / npm)
#
# DAG overview:
#   setup → parallel static (lint, typecheck, format) + codeql
#   static OK → parallel: build-frontend / build-backend / image-optimize
#   builds OK → docker-build → deploy-frontend (Vercel) + deploy-backend (Render)
#   PR:    pr-merge-gate  → required for fast feedback
#   Push:  pre-deploy-gate → production path; includes CodeQL + Docker deploys
#
# Branch protection (recommended):
#   - Pull requests: require "PR merge gate"
#   - main: require "Pre-deploy gate" for direct pushes
#

name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "chore/**", "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip deployment"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: "22"
  NODE_OPTIONS: "--max-old-space-size=4096"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Setup (install deps, cache node_modules)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache key (package-lock.json)
        id: cache-key
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -c1-16)
          echo "key=deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${LOCK_HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: npm ci (cache miss only)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Static checks (parallel)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run typecheck

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run format:check

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --source=. --verbose --redact --report-format=sarif --report-path=gitleaks-report.sarif --exit-code=1

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          config: |
            query-filters:
              - exclude:
                  problem.severity:
                    - recommendation
            paths-ignore:
              - node_modules
              - .next
              - coverage
              - '**/*.test.ts'
              - '**/*.spec.ts'

      - uses: github/codeql-action/autobuild@v3

      - id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
          upload: true
          output: sarif-results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif
          path: sarif-results
          retention-days: 30

      - name: Fail on CodeQL error/warning findings
        run: |
          SARIF_DIR="sarif-results"
          FAILED=false
          if [ -d "$SARIF_DIR" ]; then
            for f in "$SARIF_DIR"/*.sarif; do
              if [ ! -f "$f" ]; then continue; fi
              ERROR_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "error")] | length' "$f" 2>/dev/null)
              if [ -z "$ERROR_COUNT" ]; then ERROR_COUNT=0; fi
              WARNING_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "warning")] | length' "$f" 2>/dev/null)
              if [ -z "$WARNING_COUNT" ]; then WARNING_COUNT=0; fi
              if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
                echo "::error::CodeQL found ${ERROR_COUNT} critical security issues"
                FAILED=true
              fi
              if [ "${WARNING_COUNT:-0}" -gt 0 ]; then
                echo "::warning::CodeQL found ${WARNING_COUNT} high-severity issues"
                FAILED=true
              fi
              {
                echo "## CodeQL"
                echo "| Severity | Count |"
                echo "|----------|-------|"
                echo "| Critical | ${ERROR_COUNT:-0} |"
                echo "| High | ${WARNING_COUNT:-0} |"
              } >> "$GITHUB_STEP_SUMMARY"
            done
          fi
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "CodeQL passed" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Parallel builds + image optimisation
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: build-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci

      # Cache Next.js build artifacts between runs
      - uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/next.config.ts') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Build Next.js (production)
        run: |
          # Set up build env vars with default fallbacks using shell parameters (no server secrets)
          export NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder-anon-key}"
          export NEXT_PUBLIC_RAZORPAY_KEY_ID="${NEXT_PUBLIC_RAZORPAY_KEY_ID:-placeholder-razorpay-key}"
          export NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL:-https://example.com}"
          export NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL:-https://example.com}"
          export NEXT_PUBLIC_GA4_ID="${NEXT_PUBLIC_GA4_ID:-}"
          export NEXT_PUBLIC_GTM_ID="${NEXT_PUBLIC_GTM_ID:-}"
          export BACKEND_API_URL="${BACKEND_API_URL:-http://localhost:5001}"
          npm run build:frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_MAINTENANCE_MODE: "false"
          NEXT_PUBLIC_GA4_ID: ${{ secrets.NEXT_PUBLIC_GA4_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}

      - name: Build summary
        run: echo "## ✅ Frontend build passed" >> "$GITHUB_STEP_SUMMARY"

  build-backend:
    name: build-backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma
      - name: Compile TypeScript
        run: npm run build:backend
      - name: Build summary
        run: echo "## ✅ Backend build passed" >> "$GITHUB_STEP_SUMMARY"

  image-optimize:
    name: image-optimize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci

      - name: Run image optimiser
        id: optimize
        run: |
          echo "## 🖼️ Image Optimisation Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/optimize-images.mjs 2>&1 | tee /tmp/img-opt.log
          cat /tmp/img-opt.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload optimised assets
        uses: actions/upload-artifact@v4
        with:
          name: optimised-images-${{ github.run_id }}
          path: frontend/public/
          retention-days: 3

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Run Workspace Tests
        run: npm run test

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [setup]
    steps:
      - name: Checkout (release branches)
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/cache@v4
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        with:
          path: |
            node_modules
            frontend/node_modules
            backend/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) && hashFiles('node_modules/.package-lock.json') == '' }}
        run: npm ci

      - name: Generate CycloneDX SBOM
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Validate SBOM
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        run: |
          test -s sbom.json
          jq -e '.bomFormat == "CycloneDX"' sbom.json

      - uses: actions/upload-artifact@v4
        if: ${{ !(github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')) }}
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 90

      - name: SBOM noop (non-release branches)
        if: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}
        run: echo "SBOM artifact only on main and release/*; job succeeded."

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Docker build & push (main + release branches only)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-frontend, build-backend, image-optimize]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Download the optimised images produced by the image-optimize job
      - name: Download optimised images
        uses: actions/download-artifact@v4
        with:
          name: optimised-images-${{ github.run_id }}
          path: frontend/public/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set build-time backend URL
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          echo "BACKEND_API_URL=${BACKEND_API_URL:-http://backend:5001}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          DOCKER_PASSWORD="${GHCR_TOKEN:-${{ secrets.GITHUB_TOKEN }}}"
          echo "$DOCKER_PASSWORD" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and conditionally push) Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GA4_ID=${{ secrets.NEXT_PUBLIC_GA4_ID }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            BACKEND_API_URL=${{ env.BACKEND_API_URL }}
          # Layer caching via GHCR
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:buildcache,mode=max

      - name: Docker build summary
        run: |
          {
            echo "## 🐳 Docker Build"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}\` |"
            echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |"
            echo "| Pushed | \`${{ github.event_name != 'pull_request' }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 5 — Deploy (main branch pushes only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: deploy-frontend (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.skip_deploy != 'true')
    environment:
      name: production
      url: https://example.com
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Vercel secrets
        id: check-vercel
        run: |
          skip_vercel=false
          if [ -z "$VERCEL_TOKEN" ]; then skip_vercel=true; fi
          if [ -z "$VERCEL_ORG_ID" ]; then skip_vercel=true; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then skip_vercel=true; fi
          if [ "$skip_vercel" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel secrets not configured — skipping frontend deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: steps.check-vercel.outputs.skip != 'true'
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-version: "51.8.0"
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          github-comment: true

      - name: Frontend deploy summary
        run: |
          {
            echo "## 🚀 Frontend Deployed (Vercel)"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Actor  | ${{ github.actor }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Time   | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-backend:
    name: deploy-backend (Render)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.skip_deploy != 'true')
    steps:
      - name: Check Render deploy hook secret
        id: check-render
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::RENDER_DEPLOY_HOOK_URL not configured — skipping backend deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Render deploy
        if: steps.check-render.outputs.skip != 'true'
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Render deploy triggered (HTTP $HTTP_STATUS)"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Backend deploy summary
        run: |
          {
            echo "## 🚀 Backend Deployed (Render)"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Actor  | ${{ github.actor }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Time   | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate jobs — fan-in for branch protection rules
  # ─────────────────────────────────────────────────────────────────────────────
  pr-merge-gate:
    name: PR merge gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - lint
      - typecheck
      - format-check
      - secret-scan
      - build-frontend
      - build-backend
      - image-optimize
      - docker-build
      - sbom
      - dependency-review
      - unit-tests
    steps:
      - name: Summary
        run: |
          {
            echo "## PR merge gate passed"
            echo "Required checks complete (CodeQL runs in parallel and gates **production** via pre-deploy)."
            echo ""
            echo "| Area | Jobs |"
            echo "|------|------|"
            echo "| Static | lint, typecheck, format-check |"
            echo "| Security | secret-scan |"
            echo "| Build | build-frontend, build-backend |"
            echo "| Assets | image-optimize |"
            echo "| Docker | docker-build |"
            echo "| Ship | sbom, dependency-review |"
          } >> "$GITHUB_STEP_SUMMARY"

  pre-deploy-gate:
    name: Pre-deploy gate (production path)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - lint
      - typecheck
      - format-check
      - secret-scan
      - codeql
      - build-frontend
      - build-backend
      - image-optimize
      - docker-build
      - deploy-frontend
      - deploy-backend
      - sbom
      - unit-tests
    steps:
      - name: Summary
        run: |
          {
            echo "## Pre-deploy gate passed"
            echo "All production blockers green, including **CodeQL**, **validated SBOM** (main/release), builds, Docker, and deploys."
          } >> "$GITHUB_STEP_SUMMARY"
