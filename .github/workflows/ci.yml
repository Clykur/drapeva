# Golden Silk Emporium — CI/CD (Next.js / TypeScript / Supabase / npm)
#
# DAG overview:
#   setup → parallel static (lint, typecheck, format) + config-quality + deps/licenses + scans + codeql
#   static OK → parallel: unit / integration / security / CRUD / build
#   build   → bundle-size check + optional .next artifact (same job; no cross-job download)
#   PR:     pr-merge-gate  → required for fast feedback (≈3–5 min when cache warm; excludes CodeQL from gate)
#   Push:   pre-deploy-gate → production path; includes CodeQL + validated SBOM
#
# Branch protection (recommended):
#   - Pull requests: require "PR merge gate" + "Dependency Review"
#   - main: require "Pre-deploy gate (production path)" for direct pushes (or rely on merge queue)

name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'chore/**', 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  NODE_VERSION: '22'
  NODE_OPTIONS: '--max-old-space-size=4096'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    timeout-minutes: 6
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache key (package-lock.json)
        id: cache-key
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -c1-16)
          echo "key=deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${LOCK_HASH}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: npm ci (cache miss only)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - name: npm ci (if restore incomplete)
        if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run lint:strict

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run typecheck

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run format:check

  config-quality:
    name: config-quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Ensure .env.test
        run: node scripts/infrastructure/ensure-env-test.js
      - name: verify-env
        run: npx dotenv-cli -e .env.test -- npx ts-node --project scripts/tsconfig.json scripts/verify-env.ts
      - name: Node version policy
        run: node scripts/infrastructure/check-node-version.js
      - name: Lockfile integrity
        run: node scripts/infrastructure/check-lockfile.js
      - name: depcheck
        run: node scripts/infrastructure/run-quality-gate.js quality:depcheck
      - name: ts-prune
        run: node scripts/infrastructure/run-quality-gate.js quality:ts-prune

  dependency-and-licenses:
    name: dependency-and-licenses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: npm run security:audit
      - run: npm run security:deps
      - run: node scripts/infrastructure/run-license-check.js

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  security-custom:
    name: security-custom
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - run: node scripts/infrastructure/validate-security-and-quality.js
      - run: npm run security-check

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          config: |
            query-filters:
              - exclude:
                  problem.severity:
                    - recommendation
            paths-ignore:
              - node_modules
              - .next
              - .next-build
              - coverage
              - '**/*.test.ts'
              - '**/*.spec.ts'

      - uses: github/codeql-action/autobuild@v3

      - id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
          upload: true
          output: sarif-results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif
          path: sarif-results
          retention-days: 30

      - name: Fail on CodeQL error/warning findings
        run: |
          SARIF_DIR="sarif-results"
          FAILED=false
          if [ -d "$SARIF_DIR" ]; then
            for f in "$SARIF_DIR"/*.sarif; do
              [ -f "$f" ] || continue
              ERROR_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "error")] | length' "$f" 2>/dev/null || echo 0)
              WARNING_COUNT=$(jq -r '[.runs[].results[]? | select(.level == "warning")] | length' "$f" 2>/dev/null || echo 0)
              if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
                echo "::error::CodeQL found ${ERROR_COUNT} critical security issues"
                FAILED=true
              fi
              if [ "${WARNING_COUNT:-0}" -gt 0 ]; then
                echo "::warning::CodeQL found ${WARNING_COUNT} high-severity issues"
                FAILED=true
              fi
              {
                echo "## CodeQL"
                echo "| Severity | Count |"
                echo "|----------|-------|"
                echo "| Critical | ${ERROR_COUNT:-0} |"
                echo "| High | ${WARNING_COUNT:-0} |"
              } >> "$GITHUB_STEP_SUMMARY"
            done
          fi
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "CodeQL passed" >> "$GITHUB_STEP_SUMMARY"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: [setup, lint, typecheck, format-check]
    env:
      SALON_TOKEN_SECRET: test-secret # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_APP_URL=https://example.com
          EOF
      - run: npm run test:unit
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
      - run: npx dotenv-cli -e .env.test -- npx vitest run --config vitest.unit.config.mts --coverage
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'
      - name: Coverage summary
        run: |
          echo "## Unit coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "Thresholds: \`vitest.unit.config.mts\`." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-unit
          path: coverage
          retention-days: 7

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_APP_URL=https://example.com
          EOF
      - run: npx dotenv-cli -e .env.test -- npx vitest run scripts/unit-database --config vitest.config.mts
      - run: npx dotenv-cli -e .env.test -- npm run test:database-migrations

  security-tests:
    name: security-tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_APP_URL=https://example.com
          EOF
      # These suites expect a real Supabase project (see scripts/test-utils.ts). CI uses placeholders only.
      - name: Phase 4–6 (best-effort without live DB)
        run: |
          set +e
          npm run test:phase4
          a=$?
          npm run test:phase5
          b=$?
          npm run test:phase6
          c=$?
          set -e
          if [ "$a" -ne 0 ] || [ "$b" -ne 0 ] || [ "$c" -ne 0 ]; then
            echo "::notice::Payment/RBAC/rate-limit integration tests skipped or failed (no live Supabase in CI). Wire repo secrets to enforce them."
          fi
          echo "## Security phases 4–6" >> "$GITHUB_STEP_SUMMARY"
          echo "Best-effort with placeholder .env.test; use real Supabase secrets for hard enforcement." >> "$GITHUB_STEP_SUMMARY"
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

  crud-checks:
    name: crud-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_APP_URL=https://example.com
          EOF
      - run: npm run test:crud
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: [setup, lint, typecheck, format-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      - if: hashFiles('node_modules/.package-lock.json') == ''
        run: npm ci
      - uses: actions/cache@v4
        with:
          path: |
            apps/app/.next/cache
            apps/marketing/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json', 'apps/app/next.config.js', 'apps/marketing/next.config.js') }}
          restore-keys: nextjs-${{ runner.os }}-
      - name: Production build (strict)
        run: npm run build:strict
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://example.com' }}
      # Same job as build: avoids download-artifact failures (fork PR permissions, re-runs, name mismatch).
      - name: Bundle size gate
        run: node scripts/infrastructure/run-bundle-size-check.js
      - name: Bundle size summary
        run: echo "## Bundle size" >> "$GITHUB_STEP_SUMMARY" && echo "Checked via \`run-bundle-size-check.js\` (same runner as build)." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: next-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/app/.next
            apps/marketing/.next
          retention-days: 1

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [setup]
    steps:
      - name: Checkout (release branches)
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/cache@v4
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && hashFiles('node_modules/.package-lock.json') == '' }}
        run: npm ci

      - name: Generate CycloneDX SBOM
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Validate SBOM
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        run: |
          test -s sbom.json
          jq -e '.bomFormat == "CycloneDX"' sbom.json

      - uses: actions/upload-artifact@v4
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        with:
          name: sbom-${{ github.run_id }}
          path: sbom.json
          retention-days: 90

      - name: SBOM noop (non-release branches)
        if: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}
        run: echo "SBOM artifact only on main and release/*; job succeeded."

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  pr-merge-gate:
    name: PR merge gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - lint
      - typecheck
      - format-check
      - config-quality
      - dependency-and-licenses
      - secret-scan
      - security-custom
      - unit-tests
      - integration-tests
      - security-tests
      - crud-checks
      - build
      - sbom
      - dependency-review
    steps:
      - name: Summary
        run: |
          {
            echo "## PR merge gate passed"
            echo "Required checks complete (CodeQL runs in parallel and gates **production** via pre-deploy)."
            echo ""
            echo "| Area | Jobs |"
            echo "|------|------|"
            echo "| Static | lint, typecheck, format-check |"
            echo "| Config | config-quality |"
            echo "| Deps | dependency-and-licenses, dependency-review |"
            echo "| Security | secret-scan, security-custom |"
            echo "| Tests | unit, integration, security, crud |"
            echo "| Ship | build (incl. bundle size), sbom |"
          } >> "$GITHUB_STEP_SUMMARY"

  pre-deploy-gate:
    name: Pre-deploy gate (production path)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - lint
      - typecheck
      - format-check
      - config-quality
      - dependency-and-licenses
      - secret-scan
      - security-custom
      - codeql
      - unit-tests
      - integration-tests
      - security-tests
      - crud-checks
      - build
      - sbom
    steps:
      - name: Summary
        run: |
          {
            echo "## Pre-deploy gate passed"
            echo "All production blockers green, including **CodeQL**, **validated SBOM** (main/release), and **build + bundle size**."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: [pre-deploy-gate]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (github.event.inputs.skip_deploy != 'true')
    environment:
      name: production
      url: https://cusown.clykur.com
    permissions:
      contents: read
      deployments: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Vercel marketing secrets
        id: vercel-marketing
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel marketing secrets not configured (VERCEL_PROJECT_ID)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy marketing to Vercel
        if: steps.vercel-marketing.outputs.skip != 'true'
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-version: 51.8.0
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-comment: true

      - name: Check Vercel app secrets
        id: vercel-app
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_APP_PROJECT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel app secrets not configured (VERCEL_APP_PROJECT_ID)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_APP_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

      - name: Deploy app to Vercel
        if: steps.vercel-app.outputs.skip != 'true'
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-version: 51.8.0
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_APP_PROJECT_ID }}
          vercel-args: '--prod'
          github-comment: true

      - name: Deployment audit
        run: |
          {
            echo "## Production deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Time (UTC) | $(date -u +"%Y-%m-%d %H:%M:%S") |"
          } >> "$GITHUB_STEP_SUMMARY"
