# Snyk Infrastructure as Code — scans `.github/`. Does not fail the workflow on findings or upload issues.
# Set SNYK_TOKEN in repo secrets.
#
# https://docs.snyk.io/products/snyk-infrastructure-as-code

name: Snyk Infrastructure as Code

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '44 9 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk IaC test — SARIF
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          stub_sarif() {
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk IaC","informationUri":"https://snyk.io"}},"results":[]}]}' > snyk.sarif
          }
          stub_sarif
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::notice::SNYK_TOKEN not set; skipping Snyk IaC."
            exit 0
          fi
          set +e
          snyk iac test .github --sarif-file-output=snyk.sarif
          if [ ! -s snyk.sarif ]; then stub_sarif; fi
          exit 0

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
