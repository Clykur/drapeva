# ESLint with SARIF upload to GitHub Code Scanning (same paths as npm run lint:strict).
# Uses the repo's ESLint config and lockfile for consistent results.

name: ESLint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "39 9 * * 3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eslint:
    name: Run ESLint (SARIF)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install SARIF formatter
        run: npm install --no-save @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        run: |
          set +e
          mkdir -p sarif-results

          # Run frontend eslint
          cd frontend
          npx eslint . -f @microsoft/eslint-formatter-sarif -o ../sarif-results/eslint-frontend.sarif
          ec_fe=$?
          cd ..

          # Run backend eslint
          cd backend
          npx eslint . -f @microsoft/eslint-formatter-sarif -o ../sarif-results/eslint-backend.sarif
          ec_be=$?
          cd ..

          # Ensure valid SARIF fallback if empty
          for f in sarif-results/*.sarif; do
            if [ ! -s "$f" ]; then
              printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"eslint","informationUri":"https://eslint.org"}},"results":[]}]}' > "$f"
            fi
          done

          # Return failure if either failed
          ec_total=0
          if [ $ec_fe -ne 0 ]; then ec_total=1; fi
          if [ $ec_be -ne 0 ]; then ec_total=1; fi
          if [ $ec_total -ne 0 ]; then
            exit 1
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          wait-for-processing: true
