# Snyk Code (SAST) + Open Source (SCA). SARIF is uploaded to Code Scanning when possible.
# Set SNYK_TOKEN in repo secrets. Snyk findings do not fail this workflow (see Security tab / SARIF).
#
# https://docs.snyk.io/snyk-cli/cli-reference

name: Snyk Security

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk Code (SAST) — SARIF
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          stub_sarif() {
            printf '%s\n' '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk Code","informationUri":"https://snyk.io"}},"results":[]}]}' > snyk-code.sarif
          }
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::notice::SNYK_TOKEN not set; skipping Snyk Code and using empty SARIF."
            stub_sarif
            exit 0
          fi
          set +e
          snyk code test --sarif-file-output=snyk-code.sarif --severity-threshold=high
          if [ ! -s snyk-code.sarif ]; then stub_sarif; fi
          exit 0

      - name: Snyk Open Source (SCA)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::notice::SNYK_TOKEN not set; skipping Snyk test."
            exit 0
          fi
          snyk test --all-projects --severity-threshold=high || true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
