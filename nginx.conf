# ─── Golden Silk Emporium — Nginx reverse proxy ───────────────────────────────
# Routes:
#   /api/*          → Express backend  (port 5001)
#   /api/health     → Express backend  (port 5001)  — Docker health-check
#   /               → Next.js frontend (port 3000)
#
# Gzip enabled; WebP/static assets cached 30 days.
# ─────────────────────────────────────────────────────────────────────────────

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;
gzip_vary on;
gzip_min_length 1024;

server {
    listen 80;
    server_name localhost;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health check (used by Docker / load-balancers) ────────
    location = /health {
        proxy_pass         http://backend:5001/api/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── API → Express backend ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── Static assets — long cache, serve WebP when available ─
    location ~* \.(webp|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|otf)$ {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Everything else → Next.js frontend ───────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
