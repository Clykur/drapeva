# ============================================================
# Golden Silk Emporium — Development Docker Compose
# ============================================================
# Usage:
#   docker compose up --build
#
# Services:  nginx (80) → frontend (3000) + backend (5001) + redis (6379)
# ============================================================

services:
  # ── Redis cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express backend ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps # use deps stage so we get node_modules fast
    working_dir: /app/backend
    command: >
      sh -c "npx prisma generate --schema=prisma/schema.prisma && npx tsx watch src/index.ts"
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules # keep container node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app/frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules # keep container node_modules
      - /app/frontend/.next # keep .next build cache
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true # enable polling for Docker on macOS/Windows
      - BACKEND_API_URL=http://backend:5001
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  redis_data:
